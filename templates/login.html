<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – OutingPlanning</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo"><i class="bi bi-water"></i></div>
    <h2 class="login-title">OutingPlanning</h2>
    <p class="login-sub" id="formSubtitle">Enter your name and team password to continue</p>

    <div id="alertBox" class="alert d-none py-2 px-3" role="alert">
      <i class="bi bi-exclamation-circle me-1"></i>
      <span id="alertMsg"></span>
    </div>

    <!-- TABS -->
    <ul class="nav nav-pills nav-fill mb-4">
      <li class="nav-item">
        <button class="nav-link active" id="tabLogin" onclick="switchTab('login')">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tabRegister" onclick="switchTab('register')">
          <i class="bi bi-person-plus-fill me-1"></i>Register Team
        </button>
      </li>
    </ul>

    <form id="authForm" novalidate>
      <!-- Team Name — Register only -->
      <div class="mb-3 d-none" id="fieldTeam">
        <label class="form-label"><i class="bi bi-people-fill me-1 text-primary"></i>Team Name</label>
        <input type="text" class="form-control" id="teamName" placeholder="e.g. Barkada Squad"/>
      </div>
      <!-- Your Name — Login only -->
      <div class="mb-3" id="fieldUser">
        <label class="form-label"><i class="bi bi-person-fill me-1 text-primary"></i>Your Name</label>
        <input type="text" class="form-control" id="userName" placeholder="e.g. Juan dela Cruz"/>
      </div>
      <!-- Password — always shown -->
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock-fill me-1 text-primary"></i>Team Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" placeholder="Enter team password" required/>
          <button class="btn btn-outline-secondary" type="button" id="togglePw">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="submitBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/" style="color:#0077b6;font-size:.88rem;">
        <i class="bi bi-arrow-left me-1"></i>Back to Home
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = '/api';
  let mode = 'login';

  function switchTab(tab) {
    mode = tab;
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('fieldTeam').classList.toggle('d-none', tab === 'login');
    document.getElementById('fieldUser').classList.toggle('d-none', tab === 'register');
    document.getElementById('formSubtitle').textContent = tab === 'login'
      ? 'Enter your name and team password to continue'
      : 'Register your team with a name and password';
    document.getElementById('submitBtn').innerHTML = tab === 'login'
      ? '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In'
      : '<i class="bi bi-person-plus-fill me-2"></i>Register Team';
    showAlert('', '');
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    if (!msg) { box.classList.add('d-none'); return; }
    box.className = `alert alert-${type} py-2 px-3`;
    document.getElementById('alertMsg').textContent = msg;
    box.classList.remove('d-none');
  }

  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    icon.className = pw.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  document.getElementById('authForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const user = document.getElementById('userName').value.trim();
    const pw   = document.getElementById('password').value;
    const team = document.getElementById('teamName').value.trim();

    if (mode === 'login' && (!user || !pw)) {
      showAlert('Please fill in all fields.', 'danger'); return;
    }
    if (mode === 'register' && (!team || !pw)) {
      showAlert('Please fill in all fields.', 'danger'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Please wait...';

    try {
      const endpoint = mode === 'login' ? '/login' : '/register';
      const body = mode === 'login' ? { user, password: pw } : { team, password: pw };
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Something went wrong.', 'danger');
      } else {
        if (mode === 'register') {
          showAlert('Team registered! You can now log in.', 'success');
          switchTab('login');
        } else {
          sessionStorage.setItem('teamName', data.team);
          sessionStorage.setItem('userName', data.user);
          window.location.href = '/dashboard';
        }
      }
    } catch {
      showAlert('Cannot connect to server. Make sure server.py is running.', 'danger');
    } finally {
      btn.disabled = false;
      switchTab(mode);
    }
  });
</script>
</body>
</html>
